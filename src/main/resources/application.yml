spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/user_registration}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  jwt:
    secret: ${JWT_SECRET:change-this-in-production-must-be-at-least-32-chars-long}
    access-token-expiration: 900000       # 15 minutes in ms
    refresh-token-expiration: 604800000   # 7 days in ms
  email:
    from: ${MAIL_FROM:noreply@user-registration.com}
    base-url: ${APP_BASE_URL:http://localhost:8080}
    verification-expiry-hours: 24
  captcha:
    enabled: ${CAPTCHA_ENABLED:true}
    # Google test key — always passes. Replace with real key in production.
    secret-key: ${CAPTCHA_SECRET_KEY:6LeIxAcTAAAAAGG-vFI1TnRWxMZNFuojJ4WifJWe}
    verify-url: https://www.google.com/recaptcha/api/siteverify
  brute-force:
    max-attempts: 5
    lock-duration-minutes: 30

server:
  port: 8080

logging:
  level:
    com.maxwell: DEBUG
    org.springframework.security: INFO
